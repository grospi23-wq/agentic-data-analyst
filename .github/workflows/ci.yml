name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: "dummy-key-for-ci"
      LOGFIRE_TOKEN: "dummy-token-for-ci"
      # GitHub provides the exact absolute paths dynamically
      PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/lib"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        # Bypassing 'uv run' to force Python to respect the PYTHONPATH
        run: .venv/bin/python -m pytest -v