name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: "dummy-key-for-ci"
      LOGFIRE_TOKEN: "dummy-token-for-ci"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: |
          echo "import sys, os" > conftest.py
          echo "sys.path.insert(0, os.path.abspath('.'))" >> conftest.py
          echo "sys.path.insert(0, os.path.abspath('./lib'))" >> conftest.py
          .venv/bin/python -m pytest -v